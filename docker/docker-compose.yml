# ============================================================
#  DevSearch — Docker Compose (Development)
# ============================================================
#  Run:  docker compose up -d
#  Stop: docker compose down
#  Reset: docker compose down -v  (deletes all data volumes)
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devsearch-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devsearch
      POSTGRES_USER: devsearch
      POSTGRES_PASSWORD: devsearch_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: devsearch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OpenSearch ───────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: devsearch-opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"    # REST API
      - "9600:9600"    # Performance Analyzer
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@12345
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'cluster_name'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── OpenSearch Dashboards (UI) ───────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: devsearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
